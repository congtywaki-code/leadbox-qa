name: LeadBox QA Integration 2.0.1

on:
  workflow_dispatch:
    inputs:
      capture_baselines:
        description: Capture pending visual baseline candidates
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: leadbox-qa-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  staging-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: leadbox-staging
    env:
      LEADBOX_PROFILE: 9.9.1.12-rc2
      LEADBOX_BASE_URL: ${{ secrets.LEADBOX_BASE_URL }}
      LEADBOX_APP_URL: ${{ secrets.LEADBOX_APP_URL }}
      LEADBOX_PUBLIC_URL: ${{ secrets.LEADBOX_PUBLIC_URL }}
      SUPERADMIN_USERNAME: ${{ secrets.SUPERADMIN_USERNAME }}
      SUPERADMIN_PASSWORD: ${{ secrets.SUPERADMIN_PASSWORD }}
      SHOPADMIN_USERNAME: ${{ secrets.SHOPADMIN_USERNAME }}
      SHOPADMIN_PASSWORD: ${{ secrets.SHOPADMIN_PASSWORD }}
      QA_STAGING_EXECUTION: 'true'
      QA_ALLOW_WRITE_TESTS: 'false'
      QA_ALLOW_PRODUCTION: 'false'
      QA_TEST_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Validate mapped profile
        run: npm run qa:validate

      - name: Check staging readiness
        run: npm run qa:staging:readiness

      - name: Create authenticated sessions
        run: npm run qa:setup

      - name: Capture authentication evidence
        run: npm run qa:auth:evidence

      - name: Diagnose media publish visibility
        run: npm run qa:media:diagnose

      - name: Capture visual baseline candidates
        if: ${{ inputs.capture_baselines }}
        run: npm run qa:baseline:capture

      - name: Build evidence index
        if: always()
        run: npm run qa:evidence:index

      - name: Upload staging evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: leadbox-qa-evidence-${{ github.run_id }}
          path: |
            reports/evidence/
            reports/html/
            reports/artifacts/
            test-results/
            approvals/pending/
            baselines/candidates/
          if-no-files-found: warn
          retention-days: 14
