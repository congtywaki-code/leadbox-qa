name: LeadBox QA Gate

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: leadbox-qa-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      LEADBOX_PROFILE: ${{ vars.LEADBOX_PROFILE || '9.9.1.12-rc2' }}
      LEADBOX_BASE_URL: ${{ vars.LEADBOX_BASE_URL }}
      LEADBOX_APP_URL: ${{ vars.LEADBOX_APP_URL }}
      LEADBOX_PUBLIC_URL: ${{ vars.LEADBOX_PUBLIC_URL }}
      SUPERADMIN_USERNAME: ${{ secrets.SUPERADMIN_USERNAME }}
      SUPERADMIN_PASSWORD: ${{ secrets.SUPERADMIN_PASSWORD }}
      SHOPADMIN_USERNAME: ${{ secrets.SHOPADMIN_USERNAME }}
      SHOPADMIN_PASSWORD: ${{ secrets.SHOPADMIN_PASSWORD }}
      QA_ALLOW_WRITE_TESTS: 'false'
      QA_TEST_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Validate LeadBox profile
        run: npm run qa:validate

      - name: Run desktop QA suite
        run: npx playwright test --project=desktop

      - name: Upload QA report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: leadbox-qa-report-${{ github.run_id }}
          path: |
            reports/
            test-results/
          if-no-files-found: warn
          retention-days: 14

  summarize:
    if: always()
    runs-on: ubuntu-latest
    needs: [qa]
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Create QA sample summary
        run: npm run qa:sample

      - name: Build QA dashboard
        run: npm run qa:dashboard

      - name: Analyze QA results
        run: npm run qa:analyze

      - name: Evaluate release gate
        run: npm run qa:gate

      - name: Upload QA dashboard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: leadbox-qa-dashboard-${{ github.run_id }}
          path: |
            apps/qa-dashboard/
            reports/
          if-no-files-found: warn
          retention-days: 14
